<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sea Login Premium</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* BODY */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* BACKGROUND IMAGE USING IMG TAG */
.bg-img {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  animation: zoomBg 20s infinite alternate;
}

/* ZOOM EFFECT */
@keyframes zoomBg {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* FADED OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    135deg,
    rgba(0, 180, 160, 0.6),
    rgba(0, 90, 80, 0.7)
  );
  backdrop-filter: blur(6px);
  z-index: -1;
}


/* CONTAINER */
.container {
  position: relative;
  width: 90%;
  max-width: 400px;
  padding: 35px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  box-shadow: 0 15px 50px rgba(0,0,0,0.5);
  color: white;
  z-index: 2;
  animation: fadeIn 1s ease;
}

/* TITLE */
.container h2 {
  text-align: center;
  margin-bottom: 25px;
}

/* INPUT GROUP */
.input-group {
  position: relative;
  margin-bottom: 18px;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

.input-group label {
  position: absolute;
  top: 50%;
  left: 12px;
  transform: translateY(-50%);
  font-size: 14px;
  opacity: 0.7;
  transition: 0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label {
  top: -8px;
  font-size: 12px;
  color: #00ffe0;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #00bfa5;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #008e76;
}

/* GOOGLE BUTTON */
.google-btn {
  background: white;
  color: black;
  margin-top: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.google-btn:hover {
  background: #ddd;
}

/* TOGGLE */
.toggle {
  text-align: center;
  margin-top: 15px;
  cursor: pointer;
  font-size: 14px;
  opacity: 0.8;
}

.toggle:hover {
  text-decoration: underline;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- BACKGROUND IMAGE -->
<img src="images/beach.jpeg" class="bg-img">

<!-- OVERLAY -->
<div class="overlay"></div>


<!-- FORM -->
<div class="container">
  <h2 id="formTitle">Login</h2>

  <div class="input-group" id="nameGroup" style="display:none;">
    <input type="text" id="name" required>
    <label>Name</label>
  </div>

  <div class="input-group" id="ageGroup" style="display:none;">
    <input type="number" id="age" required>
    <label>Age</label>
  </div>

  <div class="input-group">
    <input type="email" id="email" required>
    <label>Email</label>
  </div>

  <div class="input-group">
    <input type="password" id="password" required>
    <label>Password</label>
  </div>

  <button onclick="location.href='destination.html'">Login</button>

  <button class="google-btn">
    <img src="https://img.icons8.com/color/20/google-logo.png"/>
    Sign up with Google
  </button>

  <div class="toggle" onclick="toggleForm()">Don't have an account? Sign Up</div>

  <p id="msg" style="margin-top:10px;"></p>
</div>

<script>
let isSignup = false;

function toggleForm() {
  isSignup = !isSignup;

  document.getElementById('formTitle').innerText = isSignup ? "Sign Up" : "Login";
  document.querySelector('button').innerText = isSignup ? "Sign Up" : "Login";

  document.getElementById('nameGroup').style.display = isSignup ? "block" : "none";
  document.getElementById('ageGroup').style.display = isSignup ? "block" : "none";

  document.querySelector('.toggle').innerText = 
    isSignup ? "Already have an account? Login" : "Don't have an account? Sign Up";
}

function submitForm() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');

  if(email === "" || password === "") {
    msg.style.color = "orange";
    msg.innerText = "Please fill all fields!";
  msg.innerText = "Login Successful!";
  return;
  } 
  else {
    msg.style.color = "red";
    msg.innerText = isSignup ? "Account Created! " : "Invalid Credentials!";
  }
}
</script>

</body>
</html>
